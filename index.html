<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TilePlanner</title>
<style>
  :root { --blue:#2F7DE1; --bg:#f5f8fc; --fg:#1a1a1a; --muted:#5b6470; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--fg); background:var(--bg); }
  .wrap { max-width:720px; margin:0 auto; padding:48px 22px; }
  header { text-align:center; padding:64px 22px 24px; }
  .logo { width:96px;height:96px;border-radius:22px;background:linear-gradient(135deg,#eaf2fb,#fff);display:inline-grid;grid-template-columns:1fr 1fr;gap:6px;padding:18px;border:1px solid #dce6f4; }
  .logo span{ border-radius:6px; }
  .b{background:var(--blue);} .o{background:#FF9E2C;}
  h1 { font-size:30px; margin:18px 0 6px; }
  p.sub { color:var(--muted); margin:0; }
  .cards { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:34px; }
  a.card { flex:1 1 240px; text-decoration:none; color:var(--fg); background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:22px; transition:.15s; }
  a.card:hover { border-color:var(--blue); transform:translateY(-2px); }
  a.card b { color:var(--blue); }
  footer { text-align:center; color:var(--muted); font-size:13px; padding:40px 22px; }
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="b"></span><span class="o"></span><span class="b"></span><span class="b"></span></div>
    <h1>TilePlanner</h1>
    <p class="sub">Räume aufmessen, automatisch verfliesen und ein Aufmaß als PDF erstellen.</p>
  </header>
  <div class="wrap" style="padding-top:0">
    <div class="cards">
      <a class="card" href="datenschutz.html"><b>Datenschutz&shy;erklärung</b><br>Wie TilePlanner mit Daten umgeht.</a>
      <a class="card" href="support.html"><b>Support &amp; Kontakt</b><br>Hilfe, FAQ und Kontaktmöglichkeit.</a>
    </div>
  </div>
  <footer>© 2026 Phillipp Rochel · TilePlanner<br>
    <a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a> · <a href="support.html">Support</a>
  </footer>
</body>
</html>
